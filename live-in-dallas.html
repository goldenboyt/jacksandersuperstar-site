<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>live in dallas — #jacksandersuperstar®</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page page--releases page--menu-push">
      <nav class="nav">
        <details class="menu">
          <summary class="menu-trigger" aria-label="menu">
            <span class="menu-icon" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </span>
          </summary>
          <ul class="menu-list">
            <li><a href="index.html">home</a></li>
            <li><a href="music.html">music</a></li>
            <li><a href="merch.html">merch</a></li>
          </ul>
        </details>
      </nav>

      <div class="releases-layout">
        <header class="top top--releases">
          <a href="music.html" class="stream-link reveal">← music</a>
        </header>

        <p class="line reveal">live in dallas</p>
        <p class="countdown reveal" id="countdown" aria-live="polite"></p>

        <section class="rsvp reveal" aria-labelledby="rsvp-heading">
          <h2 class="rsvp-heading" id="rsvp-heading">rsvp</h2>
          <form class="rsvp-form" id="rsvp-form" novalidate>
            <div class="rsvp-field">
              <label for="rsvp-name">name</label>
              <input
                id="rsvp-name"
                name="name"
                type="text"
                autocomplete="name"
                required
              />
            </div>
            <input
              class="rsvp-honeypot"
              type="text"
              name="_honey"
              tabindex="-1"
              autocomplete="off"
              aria-hidden="true"
            />
            <button class="stream-link rsvp-submit" type="submit">rsvp</button>
            <p
              class="rsvp-message"
              id="rsvp-message"
              role="status"
              aria-live="polite"
              hidden
            ></p>
          </form>
        </section>

        <div class="live-embed reveal">
          <iframe
            src="https://www.youtube.com/embed/ZzfX8xpTkyk"
            title="live in dallas livestream"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen
          ></iframe>
        </div>
      </div>
    </main>
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <script src="script.js"></script>
  </body>
</html>
