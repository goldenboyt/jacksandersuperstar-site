<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>live in dallas — #jacksandersuperstar®</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page page--releases page--menu-push">
      <nav class="nav">
        <details class="menu">
          <summary class="menu-trigger" aria-label="menu">
            <span class="menu-icon" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </span>
          </summary>
          <ul class="menu-list">
            <li><a href="index.html">home</a></li>
            <li><a href="music.html">music</a></li>
            <li><a href="merch.html">merch</a></li>
          </ul>
        </details>
      </nav>

      <div class="releases-layout">
        <header class="top top--releases">
          <a href="music.html" class="stream-link reveal">← music</a>
        </header>

        <img
          class="release-logo live-page-logo reveal"
          src="logo.png"
          alt="#jacksandersuperstar®"
          width="3284"
          height="308"
        />
        <p class="line reveal">live in dallas</p>
        <p class="countdown reveal" id="countdown" aria-live="polite"></p>

        <section class="event-details reveal" aria-label="event details">
          <p class="event-detail">
            <strong>date:</strong> july 15th
          </p>
          <p class="event-detail">
            <strong>time:</strong> 9-11:30pm
          </p>
          <p class="event-detail">
            <strong>show starts:</strong> 9:30pm
          </p>
          <p class="event-detail">
            <strong>place:</strong> la cantera arts conservatory dallas tx
          </p>
          <div class="event-map-links">
            <a
              class="event-map-link"
              href="https://maps.apple.com/?address=1050%20N%20Westmoreland%20Rd%20%23328,%20Dallas,%20TX%2075211"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="open 1050 N Westmoreland Rd #328, Dallas, TX 75211 in Apple Maps"
            >
              <img
                class="event-map-wordmark event-map-wordmark--apple"
                src="images/apple-maps-wordmark.png"
                alt="Apple Maps"
                width="1024"
                height="312"
              />
            </a>
            <a
              class="event-map-link"
              href="https://www.google.com/maps/search/?api=1&amp;query=1050+N+Westmoreland+Rd+%23328,+Dallas,+TX+75211"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="open 1050 N Westmoreland Rd #328, Dallas, TX 75211 in Google Maps"
            >
              <img
                class="event-map-wordmark event-map-wordmark--google"
                src="images/google-maps-wordmark.png"
                alt="Google Maps"
                width="1024"
                height="197"
              />
            </a>
            <a
              class="event-map-link"
              href="https://waze.com/ul?q=1050+N+Westmoreland+Rd+%23328,+Dallas,+TX+75211&amp;navigate=yes"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="open 1050 N Westmoreland Rd #328, Dallas, TX 75211 in Waze"
            >
              <img
                class="event-map-wordmark event-map-wordmark--waze"
                src="images/waze-logo.png"
                alt="Waze"
                width="1024"
                height="296"
              />
            </a>
          </div>
        </section>

        <section class="rsvp reveal" aria-labelledby="rsvp-heading">
          <h2 class="rsvp-heading" id="rsvp-heading">rsvp</h2>
          <form class="rsvp-form" id="rsvp-form" novalidate>
            <div class="rsvp-fields">
              <div class="rsvp-field">
                <label for="rsvp-first-name">first name</label>
                <input
                  id="rsvp-first-name"
                  name="firstName"
                  type="text"
                  autocomplete="given-name"
                  required
                />
              </div>
              <div class="rsvp-field">
                <label for="rsvp-last-name">last name</label>
                <input
                  id="rsvp-last-name"
                  name="lastName"
                  type="text"
                  autocomplete="family-name"
                  required
                />
              </div>
            </div>
            <input
              class="rsvp-honeypot"
              type="text"
              name="_honey"
              tabindex="-1"
              autocomplete="off"
              aria-hidden="true"
            />
            <button class="stream-link rsvp-submit" type="submit">rsvp</button>
            <p
              class="rsvp-message"
              id="rsvp-message"
              role="status"
              aria-live="polite"
              hidden
            ></p>
          </form>
        </section>

        <section class="livestream reveal" aria-labelledby="livestream-heading">
          <h2 class="livestream-heading" id="livestream-heading">livestream</h2>
          <div class="live-embed">
            <iframe
              src="https://www.youtube.com/embed/ZzfX8xpTkyk"
              title="live in dallas livestream"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen
            ></iframe>
          </div>
        </section>
      </div>
    </main>
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <script src="script.js"></script>
  </body>
</html>
