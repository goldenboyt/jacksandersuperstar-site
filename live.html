<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>live — jack sander</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #000000;
        color: #ffffff;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 1.25rem;
      }

      .live-stage {
        width: min(100%, 56rem);
      }

      .live-embed {
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #000000;
      }

      .live-embed iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
      }
    </style>
  </head>
  <body>
    <main class="live-stage">
      <div class="live-embed">
        <iframe
          src="https://www.youtube.com/embed/videoseries?list=PLEoIsNgKzgdo"
          title="jacksandersuperstar youtube"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen
        ></iframe>
      </div>
    </main>
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
  </body>
</html>
